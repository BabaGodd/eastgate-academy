<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Assignment - Eastgate Academy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="inner-pages.css" />
  <link rel="stylesheet" href="upload-assignment.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body>

  <!-- Page Header with Return Button -->
  <div class="ea-page-header">
    <button class="ea-return-btn" onclick="history.back()">
      <i class="fas fa-arrow-left"></i> Return to Dashboard
    </button>
    <h1><i class="fas fa-upload"></i> Upload Assignment</h1>
  </div>

  <div class="ea-inner-content">
    <div class="ea-inner-form">
      <h2>New Assignment</h2>
      <form id="ea-upload-form">

        <div class="ea-inner-group">
          <label for="ea-title">Assignment Title</label>
          <input type="text" id="ea-title" placeholder="e.g. Mathematics Week 3 Worksheet" required />
        </div>

        <div class="ea-inner-group">
          <label for="ea-description">Description</label>
          <textarea id="ea-description" placeholder="Describe the assignment..." required></textarea>
        </div>

        <div class="ea-inner-group">
          <label for="ea-due-date">Due Date</label>
          <input type="date" id="ea-due-date" required />
        </div>

        <div class="ea-inner-group">
          <label for="ea-file">Assignment File (PDF or DOCX)</label>
          <input type="file" id="ea-file" accept=".pdf,.doc,.docx" required />
        </div>

        <div class="ea-inner-btn-row">
          <button type="submit" class="ea-inner-submit-btn">
            <i class="fas fa-upload"></i> Upload Assignment
          </button>
          <button type="button" class="ea-inner-cancel-btn" onclick="history.back()">
            <i class="fas fa-times"></i> Cancel
          </button>
        </div>

        <p id="ea-upload-success"></p>

      </form>
    </div>
  </div>

  <script src="upload-assignment.js"></script>
</body>
</html>
