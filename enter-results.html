<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Results - Eastgate Academy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="inner-pages.css" />
  <link rel="stylesheet" href="enter-results.css" />
</head>
<body>

  <!-- Page Header with Return Button -->
  <div class="ea-page-header">
    <button class="ea-return-btn" onclick="history.back()">
      <i class="fas fa-arrow-left"></i> Return to Dashboard
    </button>
    <h1><i class="fas fa-pen"></i> Enter Student Result</h1>
  </div>

  <div class="ea-inner-content">
    <div class="ea-inner-form">
      <h2>New Result Entry</h2>
      <form id="ea-results-form">

        <div class="ea-inner-group">
          <label for="ea-student-name">Student Name</label>
          <input type="text" id="ea-student-name" placeholder="e.g. Amy Osei" required />
        </div>

        <div class="ea-inner-group">
          <label for="ea-subject">Subject</label>
          <input type="text" id="ea-subject" placeholder="e.g. Mathematics" required />
        </div>

        <div class="ea-inner-group">
          <label for="ea-score">Score (%)</label>
          <input type="number" id="ea-score" min="0" max="100" placeholder="e.g. 85" required />
        </div>

        <div class="ea-inner-group">
          <label for="ea-term">Term</label>
          <select id="ea-term" required>
            <option value="">Select Term</option>
            <option value="Term 1">Term 1</option>
            <option value="Term 2">Term 2</option>
            <option value="Term 3">Term 3</option>
          </select>
        </div>

        <div class="ea-inner-group">
          <label for="ea-remark">Remark</label>
          <input type="text" id="ea-remark" placeholder="e.g. Excellent, Good, Needs Improvement" />
        </div>

        <div class="ea-inner-btn-row">
          <button type="submit" class="ea-inner-submit-btn">
            <i class="fas fa-save"></i> Save Result
          </button>
          <button type="button" class="ea-inner-cancel-btn" onclick="history.back()">
            <i class="fas fa-times"></i> Cancel
          </button>
        </div>

        <p id="ea-results-success"></p>

      </form>
    </div>
  </div>

  <script src="enter-results.js"></script>
</body>
</html>
