<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Results - Eastgate Academy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
  <link rel="stylesheet" href="enter-results.css" />
</head>
<body>
  <section class="ea-results-section">
    <h1>Enter Student Result</h1>
    <form id="ea-results-form">
      <div class="ea-results-group">
        <label for="ea-student-name">Student Name</label>
        <input type="text" id="ea-student-name" required />
      </div>

      <div class="ea-results-group">
        <label for="ea-subject">Subject</label>
        <input type="text" id="ea-subject" required />
      </div>

      <div class="ea-results-group">
        <label for="ea-score">Score (%)</label>
        <input type="number" id="ea-score" min="0" max="100" required />
      </div>

      <div class="ea-results-group">
        <label for="ea-term">Term</label>
        <select id="ea-term" required>
          <option value="">Select Term</option>
          <option value="Term 1">Term 1</option>
          <option value="Term 2">Term 2</option>
          <option value="Term 3">Term 3</option>
        </select>
      </div>

      <button type="submit">Save Result</button>
    </form>
    <p id="ea-results-success"></p>
  </section>

  <script src="enter-results.js"></script>
</body>
</html>
