<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Announcement - Eastgate Academy</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="inner-pages.css" />
  <link rel="stylesheet" href="post-announcement.css" />
</head>
<body>

  <!-- Page Header with Return Button -->
  <div class="ea-page-header">
    <button class="ea-return-btn" onclick="history.back()">
      <i class="fas fa-arrow-left"></i> Return to Dashboard
    </button>
    <h1><i class="fas fa-bullhorn"></i> Post New Announcement</h1>
  </div>

  <div class="ea-inner-content">
    <div class="ea-inner-form">
      <h2>New Announcement</h2>
      <form id="ea-ann-form">
        <div class="ea-inner-group">
          <label for="ea-ann-title">Announcement Title</label>
          <input type="text" id="ea-ann-title" placeholder="e.g. Sports Day — Friday 9th May" required />
        </div>
        <div class="ea-inner-group">
          <label for="ea-ann-body">Message</label>
          <textarea id="ea-ann-body" placeholder="Write your announcement here..." required></textarea>
        </div>
        <div class="ea-inner-btn-row">
          <button type="submit" class="ea-inner-submit-btn">
            <i class="fas fa-bullhorn"></i> Post Announcement
          </button>
          <button type="button" class="ea-inner-cancel-btn" onclick="history.back()">
            <i class="fas fa-times"></i> Cancel
          </button>
        </div>
        <p id="ea-ann-success"></p>
      </form>
    </div>
  </div>

  <script src="post-announcement.js"></script>
</body>
</html>
